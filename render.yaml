databases:
  - name: settle-db
    databaseName: settle_booking
    user: settle_user
    plan: free

services:
  - type: web
    name: settle-calendar-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: settle-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_EXPIRE_TIME
        value: 7d
      - key: PAYSTACK_BASE_URL
        value: https://api.paystack.co
      - key: MAIL_FROM_NAME
        value: Settle
      - key: GOOGLE_REDIRECT_URI
        value: https://settle-calendar-sync.onrender.com/api/auth/google/callback
      # Set these manually in the Render dashboard:
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
