services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: settle_booking
      POSTGRES_USER: settle_user
      POSTGRES_PASSWORD: settle_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - settle-network

  # Settle API Server
  api:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      # Override database URL for Docker network
      DATABASE_URL: postgresql://settle_user:settle_password@postgres:5432/settle_booking
    depends_on:
      - postgres
    networks:
      - settle-network

volumes:
  postgres_data:

networks:
  settle-network:
    driver: bridge
