services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: settle_booking
      POSTGRES_USER: settle_user
      POSTGRES_PASSWORD: settle_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - settle-network

  # Settle API Server
  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://settle_user:settle_password@postgres:5432/settle_booking
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRE_TIME: 7d
      GOOGLE_CLIENT_ID: 424823467003-q2lr28epgso6u3ujclu2c7ru7aoovdh9.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: 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
      GOOGLE_REDIRECT_URI: http://localhost:3001/api/auth/google/callback 
      FRONTEND_URL: http://localhost:8080
      ENCRYPTION_KEY: your-32-character-encryption-key-here
    depends_on:
      - postgres
    networks:
      - settle-network

volumes:
  postgres_data:

networks:
  settle-network:
    driver: bridge
